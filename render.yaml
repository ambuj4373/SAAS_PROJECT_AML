services:
  - type: web
    name: kycc
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn frontend.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: CH_API_KEY
        sync: false
      - key: CHARITY_COMMISSION_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
